services:
  postgres:
    image: postgres:15
    container_name: automation_postgres
    restart: always
    environment:
      POSTGRES_DB: automation
      POSTGRES_USER: automation
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - automation_network

  redis:
    image: redis:7
    container_name: automation_redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - automation_network

  minio:
    image: minio/minio
    container_name: automation_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - automation_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: automation_backend
    restart: always
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    networks:
      - automation_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: automation_frontend
    restart: always
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - automation_network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  automation_network:
